name: Build pps ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ARM64 Debug
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild tools
        uses: microsoft/setup-msbuild@v1

      - name: Restore NuGet packages
        run: nuget restore .\pps\pps.sln

      - name: Build ARM64 Debug
        run: |
          msbuild .\pps\pps.sln /p:Configuration=Debug /p:Platform=ARM64 /p:BuildInParallel=false /m:1
