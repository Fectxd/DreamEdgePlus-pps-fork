name: Build pps

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build ARM64 Release
        run: msbuild pps\pps.sln /p:Configuration=Release /p:Platform=ARM64 /m /v:minimal

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pps-ARM64-Release
          path: |
            **/ARM64/Release/pps.exe
            **/Release/pps.exe
          if-no-files-found: warn
